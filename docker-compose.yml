  #   user: root
  #   environment:
  #     - ACCEPT_EULA=Y
  #     - SA_PASSWORD="YourStrong(!)Password"
  #   ports:
  #     - "1433:1433"
  #   volumes:
  #     - mssql_data:/var/opt/mssql/data
  #   healthcheck:
  #     test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong(!)Password' -C -Q 'SELECT 1' || exit 1" ]
  #     interval: 10s
  #     retries: 5
  #     start_period: 10s
  #     timeout: 3s

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=mezun
      - POSTGRES_PASSWORD=mezunpass
      - POSTGRES_DB=mezunplatform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U mezun -d mezunplatform" ]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 3s

  # api:
  #   build:
  #     context: ./MezunPlatform.API
  #     dockerfile: Dockerfile
  #   environment:
  #     - ConnectionStrings__DefaultConnection=Server=db;Database=MezunPlatformDb;User Id=sa;Password=YourStrong(!)Password;TrustServerCertificate=True;
  #     - ASPNETCORE_ENVIRONMENT=Development
  #     - ASPNETCORE_URLS=http://+:8080
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   restart: always

  web:
    build:
      context: .
      dockerfile: MezunPlatform.UI/Dockerfile
    environment:
      - DATABASE_URL=postgresql://mezun:mezunpass@postgres:5432/mezunplatform
      - NEXTAUTH_URL=http://localhost
      - NEXTAUTH_SECRET=changeme-use-a-long-random-string # TODO: değiştir
      - AUTH_TRUST_HOST=true
      - AUTH_URL=http://localhost
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - web
    restart: always

volumes:
  # mssql_data:
  postgres_data:
