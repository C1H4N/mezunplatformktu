events {
    worker_connections 1024;
}

http {
    # --- API henüz aktif değil, eklenince uncommment et ---
    # upstream api {
    #     server api:8080;
    # }

    upstream web {
        server web:80;
    }

    server {
        listen 80;
        server_name _;

        # location /api/ {
        #     proxy_pass         http://api/;
        #     proxy_set_header   Host            $host;
        #     proxy_set_header   X-Real-IP       $remote_addr;
        #     proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        # }

        # location /swagger/ {
        #     proxy_pass         http://api/swagger/;
        #     proxy_set_header   Host            $host;
        # }

        location / {
            proxy_pass         http://web/;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}

