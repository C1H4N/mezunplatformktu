events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------- Logging ----------
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ---------- Gzip ----------
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css text/xml application/json
                    application/javascript application/rss+xml
                    application/atom+xml image/svg+xml;

    # ---------- Upstream ----------
    upstream api {
        server api:8080;
    }

    upstream web {
        server web:80;
    }

    # ---------- HTTP → HTTPS yönlendirme ----------
    server {
        listen 80;
        server_name mezunplatformktu.com www.mezunplatformktu.com; # TODO: kendi domainin

        # Let's Encrypt doğrulama
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---------- HTTPS ana sunucu ----------
    server {
        listen 443 ssl;
        http2  on;
        server_name mezunplatformktu.com www.mezunplatformktu.com; # TODO: kendi domainin

        # --- SSL Sertifikaları (Certbot ile doldurulacak) ---
        ssl_certificate     /etc/letsencrypt/live/mezunplatformktu.com/fullchain.pem; # TODO
        ssl_certificate_key /etc/letsencrypt/live/mezunplatformktu.com/privkey.pem;   # TODO

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS (1 yıl)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ---------- Güvenlik Header'ları ----------
        add_header X-Frame-Options        "SAMEORIGIN"   always;
        add_header X-Content-Type-Options "nosniff"      always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        # ---------- Proxy ortak ayarlar ----------
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # ---------- API ----------
        location /api/ {
            proxy_pass http://api/;
        }

        # ---------- Swagger UI ----------
        location /swagger/ {
            proxy_pass http://api/swagger/;
        }

        # ---------- React/Next.js UI ----------
        location / {
            proxy_pass http://web/;
        }
    }
}
